name: Build Windows Release

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify icon exists
        shell: powershell
        run: |
          if (!(Test-Path "assets/app_icon.ico")) {
            Write-Error "Missing assets/app_icon.ico"
          }

      - name: Build exe
        run: |
          pyinstaller --noconfirm --windowed --onedir --name WhisperwoodVilla --icon assets/app_icon.ico main.py

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload app build
        uses: actions/upload-artifact@v4
        with:
          name: WhisperwoodVilla-build
          path: dist/WhisperwoodVilla

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: WhisperwoodVilla-installer
          path: dist_installer/WhisperwoodVillaSetup.exe