name: Build and Release Windows App

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Verify icon exists
        shell: powershell
        run: |
          if (!(Test-Path "assets/app_icon.ico")) {
            Write-Error "Missing assets/app_icon.ico"
          }

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --onedir --name WhisperwoodVilla --icon assets/app_icon.ico --add-data "assets;assets" --add-data "whisperwood_villa_android_tab;whisperwood_villa_android_tab" main.py

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y

      - name: Build installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperwoodVilla-installer
          path: dist_installer/WhisperwoodVillaSetup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_installer/WhisperwoodVillaSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
